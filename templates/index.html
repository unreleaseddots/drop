<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DROP — upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0b;--surface:#111114;--border:#222228;--accent:#e8ff47;--accent2:#47c6ff;--text:#e4e4e8;--muted:#5a5a68;--danger:#ff4747;--success:#1aff8c}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;z-index:999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px)}
    body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4}
    .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;gap:1.5rem}
    .topbar{position:fixed;top:0;right:0;z-index:100;padding:.6rem 1rem;display:flex;gap:.5rem}
    .topbar a,.topbar button{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;padding:.4rem .85rem;cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s}
    .topbar a:hover{border-color:var(--accent2);color:var(--accent2)}
    .topbar button:hover{border-color:var(--danger);color:var(--danger)}
    header{text-align:center}
    h1{font-family:'Syne',sans-serif;font-size:clamp(3.5rem,12vw,7rem);font-weight:800;letter-spacing:-.04em;line-height:1;color:var(--accent);text-shadow:0 0 60px rgba(232,255,71,.25)}
    header p{margin-top:.5rem;color:var(--muted);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase}
    .box{width:100%;max-width:560px;border:1px solid var(--border);background:var(--surface);padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1.25rem;position:relative}
    .box::before{content:"// UPLOAD";position:absolute;top:-1px;left:1.5rem;background:var(--accent);color:#000;font-size:.65rem;font-weight:700;letter-spacing:.15em;padding:2px 8px}
    .drop-zone{border:1px dashed var(--border);padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
    .drop-zone.drag-over{border-color:var(--accent);background:rgba(232,255,71,.04)}
    .drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:2.5rem;margin-bottom:.75rem;display:block;filter:grayscale(1);transition:filter .2s}
    .drop-zone:hover .drop-icon,.drop-zone.drag-over .drop-icon{filter:none}
    .drop-label{color:var(--muted);font-size:.8rem;line-height:1.6}
    .drop-label strong{color:var(--text)}
    /* file list */
    .file-list{display:flex;flex-direction:column;gap:.5rem}
    .file-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border:1px solid var(--border);background:rgba(71,198,255,.05)}
    .file-item .fname{flex:1;color:var(--accent2);font-size:.8rem;word-break:break-all}
    .file-item .fsize{color:var(--muted);font-size:.75rem;white-space:nowrap}
    .file-item .rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0;transition:color .15s}
    .file-item .rm:hover{color:var(--danger)}
    /* options row */
    .options{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .field{display:flex;flex-direction:column;gap:.4rem}
    .field label{font-size:.65rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .field select,.field input[type="text"],.field input[type="password"]{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:.85rem;padding:.6rem .75rem;outline:none;transition:border-color .2s;width:100%}
    .field select:focus,.field input:focus{border-color:var(--accent)}
    /* progress */
    .progress-wrap{display:none;flex-direction:column;gap:.5rem}
    .progress-wrap.show{display:flex}
    .progress-bar-bg{height:4px;background:var(--border);overflow:hidden}
    .progress-bar-fill{height:100%;width:0%;background:var(--accent);transition:width .1s;box-shadow:0 0 12px rgba(232,255,71,.6)}
    .progress-label{font-size:.7rem;color:var(--muted);text-align:right}
    /* btn */
    .btn{padding:.85rem 1.5rem;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s,box-shadow .2s}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn:not(:disabled):hover{box-shadow:0 0 24px rgba(232,255,71,.4)}
    .btn .spinner{display:none;width:16px;height:16px;margin:0 auto;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite}
    .btn.loading .btn-text{display:none}
    .btn.loading .spinner{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* results */
    .results{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:560px}
    .result-card{border:1px solid var(--accent);background:var(--surface);padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.75rem;position:relative;animation:fadeUp .3s ease}
    .result-card::before{content:"// LINK";position:absolute;top:-1px;left:1rem;background:var(--accent);color:#000;font-size:.6rem;font-weight:700;letter-spacing:.15em;padding:2px 6px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .result-name{font-size:.8rem;color:var(--accent2);word-break:break-all}
    .link-row{display:flex}
    .link-input{flex:1;background:var(--bg);border:1px solid var(--border);border-right:none;color:var(--accent2);font-family:'Space Mono',monospace;font-size:.78rem;padding:.6rem .85rem;outline:none;min-width:0}
    .copy-btn{background:var(--border);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.1em;padding:.6rem .85rem;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
    .copy-btn:hover{background:var(--accent);color:#000}
    .copy-btn.copied{background:var(--success);color:#000}
    .result-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:.7rem;color:var(--muted)}
    .result-meta span{display:flex;align-items:center;gap:.3rem}
    /* error */
    .error-msg{display:none;padding:.75rem 1rem;border:1px solid var(--danger);background:rgba(255,71,71,.06);color:var(--danger);font-size:.8rem;width:100%;max-width:560px}
    .error-msg.show{display:block}
    /* new upload btn */
    .new-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.1em;padding:.65rem 1.25rem;cursor:pointer;transition:border-color .15s,color .15s;align-self:flex-start}
    .new-btn:hover{border-color:var(--text);color:var(--text)}
    footer{position:relative;z-index:1;text-align:center;color:var(--muted);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;padding-bottom:1.5rem}
    footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
<div class="topbar">
  <a href="/admin">⚙ Admin</a>
  <form action="/logout" method="POST" style="display:inline">
    <button type="submit">Sair ✕</button>
  </form>
</div>

<div class="wrap">
  <header>
    <h1>DROP</h1>
    <p>upload privado · máx 4 GB por arquivo</p>
  </header>

  <div class="box" id="uploadBox">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple/>
      <span class="drop-icon">📦</span>
      <p class="drop-label"><strong>Arraste arquivos aqui</strong><br>ou clique para selecionar · múltiplos arquivos aceitos</p>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="options">
      <div class="field">
        <label>Expiração</label>
        <select id="expirySelect">
          {% for key, hours in expiry_options.items() %}
          <option value="{{ key }}" {% if key == '24h' %}selected{% endif %}>{{ key }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Senha (opcional)</label>
        <input type="password" id="passwordInput" placeholder="Deixe vazio para sem senha"/>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">0%</span>
    </div>

    <button class="btn" id="uploadBtn" disabled>
      <span class="btn-text">Enviar arquivo(s)</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="results" id="results"></div>
</div>

<footer><a href="/">DROP</a> — privado · sem logs · expira automático</footer>

<script nonce="{{ csp_nonce }}">
  const dropZone=document.getElementById("dropZone"),
        fileInput=document.getElementById("fileInput"),
        uploadBtn=document.getElementById("uploadBtn"),
        fileList=document.getElementById("fileList"),
        progressWrap=document.getElementById("progressWrap"),
        progressFill=document.getElementById("progressFill"),
        progressLabel=document.getElementById("progressLabel"),
        errorMsg=document.getElementById("errorMsg"),
        results=document.getElementById("results"),
        expirySelect=document.getElementById("expirySelect"),
        passwordInput=document.getElementById("passwordInput");

  let selectedFiles=[];

  ["dragenter","dragover"].forEach(e=>dropZone.addEventListener(e,ev=>{ev.preventDefault();dropZone.classList.add("drag-over")}));
  ["dragleave","drop"].forEach(e=>dropZone.addEventListener(e,ev=>{ev.preventDefault();dropZone.classList.remove("drag-over")}));
  dropZone.addEventListener("drop",ev=>addFiles(Array.from(ev.dataTransfer.files)));
  fileInput.addEventListener("change",()=>addFiles(Array.from(fileInput.files)));

  function humanSize(b){if(b<1024)return b+" B";if(b<1048576)return(b/1024).toFixed(1)+" KB";if(b<1073741824)return(b/1048576).toFixed(1)+" MB";return(b/1073741824).toFixed(2)+" GB"}

  function addFiles(files){
    files.forEach(f=>{
      if(!selectedFiles.find(x=>x.name===f.name&&x.size===f.size)) selectedFiles.push(f);
    });
    renderFileList();
  }

  function renderFileList(){
    fileList.innerHTML="";
    selectedFiles.forEach((f,i)=>{
      const div=document.createElement("div");
      div.className="file-item";
      div.innerHTML=`<span class="fname">${f.name}</span><span class="fsize">${humanSize(f.size)}</span><button class="rm" data-i="${i}">✕</button>`;
      fileList.appendChild(div);
    });
    fileList.querySelectorAll(".rm").forEach(btn=>btn.addEventListener("click",()=>{
      selectedFiles.splice(parseInt(btn.dataset.i),1);
      renderFileList();
    }));
    uploadBtn.disabled=selectedFiles.length===0;
    hideError();
  }

  uploadBtn.addEventListener("click",doUpload);

  async function doUpload(){
    if(!selectedFiles.length)return;
    const fd=new FormData();
    selectedFiles.forEach(f=>fd.append("file",f));
    fd.append("expiry",expirySelect.value);
    const pw=passwordInput.value.trim();
    if(pw)fd.append("password",pw);

    uploadBtn.classList.add("loading");uploadBtn.disabled=true;
    progressWrap.classList.add("show");

    const xhr=new XMLHttpRequest();
    xhr.open("POST","/upload");
    xhr.upload.addEventListener("progress",e=>{
      if(e.lengthComputable){const p=Math.round(e.loaded/e.total*100);progressFill.style.width=p+"%";progressLabel.textContent=p+"%"}
    });
    xhr.addEventListener("load",()=>{
      uploadBtn.classList.remove("loading");progressWrap.classList.remove("show");progressFill.style.width="0%";
      try{
        const d=JSON.parse(xhr.responseText);
        if(d.uploaded&&d.uploaded.length){
          showResults(d.uploaded);
          if(d.errors&&d.errors.length) showError("Alguns arquivos falharam: "+d.errors.map(e=>e.file).join(", "));
        } else {
          showError(d.error||"Erro no upload.");
          uploadBtn.disabled=false;
        }
      }catch{showError("Resposta inválida.");uploadBtn.disabled=false;}
    });
    xhr.addEventListener("error",()=>{uploadBtn.classList.remove("loading");uploadBtn.disabled=false;progressWrap.classList.remove("show");showError("Falha de conexão.");});
    xhr.send(fd);
  }

  function showResults(uploads){
    results.innerHTML="";
    uploads.forEach(u=>{
      const link=window.location.origin+u.link;
      const card=document.createElement("div");
      card.className="result-card";
      card.innerHTML=`
        <span class="result-name">📦 ${u.name}</span>
        <div class="link-row">
          <input class="link-input" type="text" value="${link}" readonly/>
          <button class="copy-btn">Copiar</button>
        </div>
        <div class="result-meta">
          <span>📦 ${u.size}</span>
          <span>⏱ Expira em ${u.expiry}</span>
          ${u.password?'<span>🔒 Com senha</span>':''}
        </div>`;
      const copyBtn=card.querySelector(".copy-btn");
      const inp=card.querySelector(".link-input");
      copyBtn.addEventListener("click",()=>{
        navigator.clipboard.writeText(inp.value).then(()=>{
          copyBtn.textContent="Copiado ✓";copyBtn.classList.add("copied");
          setTimeout(()=>{copyBtn.textContent="Copiar";copyBtn.classList.remove("copied")},2000);
        });
      });
      results.appendChild(card);
    });
    // reset
    selectedFiles=[];fileList.innerHTML="";uploadBtn.disabled=true;passwordInput.value="";
    // botão pra novo upload
    const nb=document.createElement("button");nb.className="new-btn";nb.textContent="↩ Novo upload";
    nb.addEventListener("click",()=>{results.innerHTML="";hideError()});
    results.appendChild(nb);
  }

  function showError(m){errorMsg.textContent="⚠ "+m;errorMsg.classList.add("show")}
  function hideError(){errorMsg.classList.remove("show")}
</script>
</body>
</html>
